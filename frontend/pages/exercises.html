<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTracker — Каталог упражнений</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">FitTracker</div>
        <div class="navbar-links">
            <a href="profile.html">Профиль</a>
            <a href="exercises.html" class="active">Каталог</a>
            <a href="create-workout.html">Добавить тренировку</a>

        <h1 class="page-title">Каталог упражнений</h1>

        <div class="search-bar">

        </div>

        <div class="grid-4" id="exercises-grid">
            <div class="loader-screen" style="grid-column: 1/-1; height: 200px;">

    <script src="../js/api.js"></script>
