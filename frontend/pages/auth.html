<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTracker — Вход</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-logo">FitTracker</div>
            <p class="auth-description">Твой персональный фитнес-трекер</p>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Вход</div>
                <div class="auth-tab" data-tab="register">Регистрация</div>
            </div>

            <div id="alert" class="alert alert-error"></div>

            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Пароль</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-login">Логин</label>
                    <input type="text" id="reg-login" class="form-input" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-password">Пароль</label>
                    <input type="password" id="reg-password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
